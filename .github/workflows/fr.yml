name: Run Script TNT Every 3 Hours FR

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run_script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create folders
        run: |
          mkdir -p fr
          mkdir -p txt

      - name: Generate All Channels (Ultra Safe Mode)
        run: |
          set +e  # 🔥 لا توقف مهما حدث

          USER_AGENT="Mozilla/5.0 (Linux; Android 14) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/127.0.6533.103 Mobile Safari/537.36"

          fetch_with_retry() {
            local url=$1
            local referer=$2
            local output=$3

            for i in 1 2 3; do
              echo "🔁 Retry $i..."

              timeout 25 curl -k -s \
                -e "$referer" \
                -A "$USER_AGENT" \
                -H "Origin: $referer" \
                "$url" > "$output" 2>/dev/null || true

              if [ -s "$output" ]; then
                return 0
              fi
            done

            return 1
          }

          declare -A CHANNELS=(
            [videotf1]="https://callofliberty.fr/tv/1-TF1/1-TF1.php"
            [videotf1fs]="https://callofliberty.fr/tv/20-TF1SERIESFILMS/20-TF1SERIESFILMS.php"
            [videotfx]="https://callofliberty.fr/tv/11-TFX/11-TFX.php"
            [videolci]="https://callofliberty.fr/tv/15-LCI/15-LCI.php"
            [videocp]="https://callofliberty.fr/tv/76-CANALPLUS/76-CANALPLUS.php"
            [videom6]="https://callofliberty.fr/tv/6-M6/6-M6.php"
            [videow9]="https://callofliberty.fr/tv/9-W9/9-W9.php"
            [videogulli]="https://callofliberty.fr/tv/12-Gulli/12-Gulli.php"
            [video6ter]="https://callofliberty.fr/tv/22-6ter/22-6ter.php"
            [videoab1]="https://callofliberty.fr/tv/101-AB1/101-AB1.php"
            [videoab3]="https://callofliberty.fr/tv/328-AB3/328-AB3.php"
            [videortl9]="https://callofliberty.fr/tv/99-RTL9/99-RTL9.php"
            [videormcstory]="https://callofliberty.fr/tv/23-RMCSTORY/23-RMCSTORY.php"
            [videormclife]="https://callofliberty.fr/tv/25-RMCLIFE/25-RMCLIFE.php"
            [videormcdecouverte]="https://callofliberty.fr/tv/24-RMCDECOUVERTE/24-RMCDECOUVERTE.php"
            [videotcm]="https://callofliberty.fr/tv/102-TCMCINEMA/102-TCMCINEMA.php"
            [videocanalj]="https://callofliberty.fr/tv/62-CanalJ/62-CanalJ.php"
            [videocnw]="https://callofliberty.fr/tv/64-CARTOONNETWORK/64-CARTOONNETWORK.php"
            [videoplanete]="https://callofliberty.fr/tv/130-PLANETEPLUS/130-PLANETEPLUS.php"
            [videoanimaux]="https://callofliberty.fr/tv/136-ANIMAUX/136-ANIMAUX.php"
            [videorts1]="https://callofliberty.fr/tv/301-RTS1/301-RTS1.php"
            [videorts2]="https://callofliberty.fr/tv/302-RTS2/302-RTS2.php"
            [videof2]="https://callofliberty.fr/tv/2-france.2/2-france.2.php"
            [videof3]="https://callofliberty.fr/tv/3-france.3/3-france.3.php"
            [videof4]="https://callofliberty.fr/tv/4-france.4/4-france.4.php"
            [videof5]="https://callofliberty.fr/tv/5-france.5/5-france.5.php"
            [videofranceinfo]="https://callofliberty.fr/tv/16-franceinfo/16-franceinfo.php"
            [videotrek]="https://callofliberty.fr/tv/212-Trek/212-Trek.php"
            [videoalpha]="https://callofliberty.fr/tv/299-canalalpha/299-canalalpha.php"
            [videocarac1]="https://callofliberty.fr/tv/304-carac1/304-carac1.php"
            [videocarac2]="https://callofliberty.fr/tv/305-carac2/305-carac2.php"
            [videocarac3]="https://callofliberty.fr/tv/306-carac3/306-carac3.php"
            [videocarac4]="https://callofliberty.fr/tv/307-carac4/307-carac4.php"
            [videocarac5]="https://callofliberty.fr/tv/308-carac5/308-carac5.php"
            [videoarte]="https://callofliberty.fr/tv/7-ARTE/7-ARTE.php"
            [videomtv]="https://callofliberty.fr/tv/112-MTV/112-MTV.php"
            [videomezzo]="https://callofliberty.fr/tv/147-mezzo/147-mezzo.php"
            [videotvm3]="https://callofliberty.fr/tv/303-tvm3/303-tvm3.php"
          )

          for key in "${!CHANNELS[@]}"; do
            url="${CHANNELS[$key]}"
            echo "=============================="
            echo "Processing $key"

            # استخراج الرابط (مع حماية)
            stream=$(timeout 20 curl -k -s -H "User-Agent: $USER_AGENT" "$url" 2>/dev/null | grep -oP "source:\s*'\K[^']+(?=',)" || true)

            if [ -z "$stream" ]; then
              echo "❌ Failed to extract stream for $key"
              continue
            fi

            # تحميل مع retry
            fetch_with_retry "$stream" "https://callofliberty.fr/" "fr/$key.m3u8"

            if [ ! -s "fr/$key.m3u8" ]; then
              echo "❌ Empty or failed $key"
              rm -f "fr/$key.m3u8"
              continue
            fi

            echo "✅ Done $key"
          done

      - name: Special Case (TMC)
        run: |
          set +e
          stream=$(curl -k -s https://callofliberty.fr/tv/1-TF1/1-TF1.php | grep -oP "source:\s*'\K[^']+(?=',)" | sed 's|TF1|TMC|g' || true)

          if [ -n "$stream" ]; then
            timeout 20 curl -k -s -e "https://callofliberty.fr/" -H "Origin: https://callofliberty.fr" "$stream" > fr/videotmc.m3u8 || true
          fi

      - name: Special Case (beIN)
        run: |
          set +e
          stream=$(curl -k -s https://lovetier.bz/player/beINAR2 | grep -oP 'streamUrl\s*:\s*"\K[^"]+' | sed 's/\\//g' || true)

          if [ -n "$stream" ]; then
            timeout 20 curl -k -s -e "https://lovetier.bz/" -H "Origin: https://lovetier.bz" "$stream" -o fr/videobeinar2.m3u8 || true
          fi

      - name: Commit and Push
        run: |
          git config --local user.email "kada.developers@gmail.com"
          git config --local user.name "kadadevelopers"
          git add fr/*.m3u8
          git commit -m "auto update channels" || echo "No changes"
          git push

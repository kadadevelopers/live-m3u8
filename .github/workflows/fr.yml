name: Extract TF1 Stream via Browser

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Run Browser Scraper
        run: |
          node << 'EOF'
          const puppeteer = require("puppeteer");
          const fs = require("fs");

          (async () => {
            const browser = await puppeteer.launch({
              headless: "new",
              args: ["--no-sandbox", "--disable-setuid-sandbox"]
            });

            const page = await browser.newPage();

            let foundUrl = null;

            console.log("🚀 Opening page...");

            // 🎯 التقاط requests + responses
            page.on("request", request => {
              const url = request.url();

              if (
                url.includes(".m3u8") ||
                url.includes("tf1-cmaf") ||
                url.includes("diff.tf1.fr")
              ) {
                console.log("📡 REQUEST:", url);
                foundUrl = url;
              }
            });

            page.on("response", response => {
              const url = response.url();

              if (url.includes(".m3u8")) {
                console.log("📥 RESPONSE:", url);
                foundUrl = url;
              }
            });

            await page.setUserAgent(
              "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120 Safari/537.36"
            );

            await page.goto(
              "https://callofliberty.fr/tv/1-TF1/1-TF1.php",
              { waitUntil: "domcontentloaded", timeout: 60000 }
            );

            // 🎯 وقت كافي لتشغيل المشغل
            await new Promise(r => setTimeout(r, 15000));

            // 🎯 محاولة trigger للفيديو
            try {
              await page.mouse.click(200, 200);
            } catch (e) {}

            await new Promise(r => setTimeout(r, 5000));

            await browser.close();

            if (!foundUrl) {
              console.log("❌ No m3u8 found");
              process.exit(1);
            }

            console.log("✅ FINAL URL:", foundUrl);

            fs.mkdirSync("fr", { recursive: true });
            fs.writeFileSync("fr/videotf1.m3u8", foundUrl);

          })();
          EOF

      - name: Commit
        run: |
          git config --local user.email "kada.developers@gmail.com"
          git config --local user.name "kadadevelopers"
          git add fr/videotf1.m3u8
          git commit -m "update stream" || echo "no changes"
          git push

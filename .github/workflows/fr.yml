name: Run Script TNT Every 6 Hours FR

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run_script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Create fr Folder
        run: mkdir -p fr

      - name: Create txt Folder
        run: mkdir -p txt        

      # =========================
      # FUNCTION SAFE FETCH
      # =========================
      - name: Define Safe Function
        run: |
          cat << 'EOF' > safe_fetch.sh
          fetch_channel() {
            NAME=$1
            URL=$2

            echo "Processing $NAME"

            stream=$(curl -k -s -H "User-Agent: Mozilla/5.0" "$URL" \
              | grep -oP "source:\s*'\K[^']+" \
              | grep -E "m3u8" \
              | head -n 1)

            if [ -z "$stream" ]; then
              echo "❌ Failed (no stream) $NAME"
              return 0
            fi

            curl -k -s \
              -e "https://callofliberty.fr/" \
              -A "Mozilla/5.0" \
              -H "Origin: https://callofliberty.fr" \
              "$stream" > "fr/$NAME.m3u8" || true

            if [ ! -s "fr/$NAME.m3u8" ]; then
              echo "❌ Empty file $NAME"
              rm -f "fr/$NAME.m3u8"
              return 0
            fi

            echo "✅ Done $NAME"
          }
          EOF

      # =========================
      # CHANNELS (SAFE)
      # =========================
      - name: Run All Channels Safely
        run: |
          source safe_fetch.sh

          fetch_channel videotf1 https://callofliberty.fr/tv/1-TF1/1-TF1.php
          fetch_channel videotf1fs https://callofliberty.fr/tv/20-TF1SERIESFILMS/20-TF1SERIESFILMS.php
          fetch_channel videotfx https://callofliberty.fr/tv/11-TFX/11-TFX.php
          fetch_channel videolci https://callofliberty.fr/tv/15-LCI/15-LCI.php
          fetch_channel videocp https://callofliberty.fr/tv/76-CANALPLUS/76-CANALPLUS.php
          fetch_channel videom6 https://callofliberty.fr/tv/6-M6/6-M6.php
          fetch_channel videow9 https://callofliberty.fr/tv/9-W9/9-W9.php
          fetch_channel videogulli https://callofliberty.fr/tv/12-Gulli/12-Gulli.php
          fetch_channel video6ter https://callofliberty.fr/tv/22-6ter/22-6ter.php
          fetch_channel videoab1 https://callofliberty.fr/tv/101-AB1/101-AB1.php
          fetch_channel videoab3 https://callofliberty.fr/tv/328-AB3/328-AB3.php
          fetch_channel videortl9 https://callofliberty.fr/tv/99-RTL9/99-RTL9.php
          fetch_channel videormcstory https://callofliberty.fr/tv/23-RMCSTORY/23-RMCSTORY.php
          fetch_channel videormclife https://callofliberty.fr/tv/25-RMCLIFE/25-RMCLIFE.php
          fetch_channel videormcdecouverte https://callofliberty.fr/tv/24-RMCDECOUVERTE/24-RMCDECOUVERTE.php
          fetch_channel videotcm https://callofliberty.fr/tv/102-TCMCINEMA/102-TCMCINEMA.php
          fetch_channel videocanalj https://callofliberty.fr/tv/62-CanalJ/62-CanalJ.php
          fetch_channel videocnw https://callofliberty.fr/tv/64-CARTOONNETWORK/64-CARTOONNETWORK.php
          fetch_channel videoplanete https://callofliberty.fr/tv/130-PLANETEPLUS/130-PLANETEPLUS.php
          fetch_channel videoanimaux https://callofliberty.fr/tv/136-ANIMAUX/136-ANIMAUX.php
          fetch_channel videorts1 https://callofliberty.fr/tv/301-RTS1/301-RTS1.php
          fetch_channel videorts2 https://callofliberty.fr/tv/302-RTS2/302-RTS2.php
          fetch_channel videof2 https://callofliberty.fr/tv/2-france.2/2-france.2.php
          fetch_channel videof3 https://callofliberty.fr/tv/3-france.3/3-france.3.php
          fetch_channel videof4 https://callofliberty.fr/tv/4-france.4/4-france.4.php
          fetch_channel videof5 https://callofliberty.fr/tv/5-france.5/5-france.5.php
          fetch_channel videofranceinfo https://callofliberty.fr/tv/16-franceinfo/16-franceinfo.php
          fetch_channel videotrek https://callofliberty.fr/tv/212-Trek/212-Trek.php
          fetch_channel videoalpha https://callofliberty.fr/tv/299-canalalpha/299-canalalpha.php
          fetch_channel videocarac1 https://callofliberty.fr/tv/304-carac1/304-carac1.php
          fetch_channel videocarac2 https://callofliberty.fr/tv/305-carac2/305-carac2.php
          fetch_channel videocarac3 https://callofliberty.fr/tv/306-carac3/306-carac3.php
          fetch_channel videocarac4 https://callofliberty.fr/tv/307-carac4/307-carac4.php
          fetch_channel videocarac5 https://callofliberty.fr/tv/308-carac5/308-carac5.php
          fetch_channel videoarte https://callofliberty.fr/tv/7-ARTE/7-ARTE.php
          fetch_channel videomtv https://callofliberty.fr/tv/112-MTV/112-MTV.php
          fetch_channel videomezzo https://callofliberty.fr/tv/147-mezzo/147-mezzo.php
          fetch_channel videotvm3 https://callofliberty.fr/tv/303-tvm3/303-tvm3.php

      # =========================
      # SPECIAL CASES
      # =========================
      - name: Special Case TMC
        run: |
          stream=$(curl -k -s https://callofliberty.fr/tv/1-TF1/1-TF1.php \
            | grep -oP "source:\s*'\K[^']+" \
            | grep m3u8 | head -n1 | sed 's|TF1|TMC|g')

          [ -n "$stream" ] && curl -k -s "$stream" > fr/videotmc.m3u8 || true

      - name: Special Case beIN
        run: |
          stream=$(curl -k -s https://lovetier.bz/player/beINAR2 \
            | grep -oP 'streamUrl\s*:\s*"\K[^"]+' \
            | sed 's/\\//g')

          [ -n "$stream" ] && curl -k -s "$stream" -o fr/videobeinar2.m3u8 || true

      # =========================
      # COMMIT
      # =========================
      - name: Commit and Push Changes
        run: |
          git config --local user.email "kada.developers@gmail.com"
          git config --local user.name "kadadevelopers"
          git add fr/*.m3u8
          git commit -m "latest updates" || echo "No changes"
          git push

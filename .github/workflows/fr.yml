name: Run Script TNT Every 6 Hours FR

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run_script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Create folders
        run: |
          mkdir -p fr
          mkdir -p txt

      - name: Fetch TF1 Stream Directly
        run: |
          echo "Fetching master playlist..."

          url="https://s2.callofliberty.fr/streams/TF1/master.m3u8?callofliberty=$(date +%s)"

          echo "URL: $url"

          stream=$(curl -k -L -s \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64)" \
            -H "Referer: https://callofliberty.fr/" \
            -H "Origin: https://callofliberty.fr" \
            "$url")

          if [ -z "$stream" ]; then
            echo "❌ Failed to fetch stream"
            exit 1
          fi

          echo "$stream" > fr/videotf1.m3u8

          echo "✅ TF1 stream saved"

      - name: Commit and Push Changes
        run: |
          git config --local user.email "kada.developers@gmail.com"
          git config --local user.name "kadadevelopers"
          git add fr/*.m3u8
          git commit -m "latest updates" || echo "No changes"
          git push

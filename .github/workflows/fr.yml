name: Extract TF1 Final Stream FIXED

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y curl grep

      - name: Extract FINAL m3u8 (redirect-safe)
        run: |
          mkdir -p fr

          echo "🚀 Fetching page..."

          page=$(curl -s -L "https://callofliberty.fr/tv/1-TF1/1-TF1.php")

          master=$(echo "$page" | grep -oP "https://s2\.callofliberty\.fr/streams/TF1/master\.m3u8\?[^'\"]+" | head -1)

          if [ -z "$master" ]; then
            echo "❌ Master not found"
            exit 1
          fi

          echo "📡 MASTER:"
          echo "$master"

          echo "🔁 Following redirects to FINAL CDN..."

          final=$(curl -s -L -o /dev/null -w "%{url_effective}" "$master")

          echo "✅ FINAL URL:"
          echo "$final"

          echo "$final" > fr/videotf1.m3u8

      - name: Commit
        run: |
          git config --local user.email "kada.developers@gmail.com"
          git config --local user.name "kadadevelopers"
          git add fr/videotf1.m3u8
          git commit -m "update stream" || echo "no changes"
          git push
